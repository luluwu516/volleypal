name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      # `npm install` instead of `npm ci` — sharp/emnapi transitive deps
      # resolve differently on Linux vs macOS (optional platform binaries),
      # so a lockfile generated on macOS trips `npm ci`'s strict check on
      # Linux runners. Not fully deterministic but reliable across OSes.
      - run: npm install --no-audit --no-fund --prefer-offline
      - name: Lint
        run: npm run lint
      - name: Type-check & build
        env:
          # Placeholders so next build doesn't fail on missing envs.
          # Real values are only needed at runtime.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          SESSION_COOKIE_SECRET: "0123456789abcdef0123456789abcdef"
          FORM_WEBHOOK_SHARED_SECRET: placeholder
        run: npm run build
      - name: Test
        run: npm test
