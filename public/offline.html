<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>離線 · VolleyPal</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0a0a0a;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }
    main {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: max(2rem, env(safe-area-inset-top)) 1.5rem max(2rem, env(safe-area-inset-bottom));
      text-align: center;
    }
    .glyph { font-size: 3rem; line-height: 1; }
    h1 { font-size: 1.125rem; font-weight: 600; margin: 0; }
    p {
      color: #a1a1aa;
      font-size: 0.875rem;
      line-height: 1.5;
      margin: 0;
      max-width: 22rem;
    }
    button {
      appearance: none;
      background: #fafafa;
      color: #0a0a0a;
      border: 0;
      border-radius: 0.5rem;
      padding: 0.625rem 1.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <main>
    <div class="glyph">📡</div>
    <h1>目前無法連線</h1>
    <p>檢查一下你的網路，或是等一下再試。已載入的頁面仍然可以使用。</p>
    <button type="button" onclick="location.reload()">重新載入</button>
  </main>
</body>
</html>
